<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traffic Torch Tools</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #ffffff;
      color: #1f2937;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: #111827;
        color: #e5e7eb;
      }
    }
    h2 {
      margin: 0 0 16px 0;
      font-size: 18px;
      text-align: center;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    li {
      margin-bottom: 8px;
    }
    a {
      display: block;
      padding: 12px 16px;
      background: #f3f4f6;
      color: #1f2937;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      transition: background 0.2s;
    }
    @media (prefers-color-scheme: dark) {
      a {
        background: #374151;
        color: #e5e7eb;
      }
    }
    a:hover {
      background: #e5e7eb;
    }
    @media (prefers-color-scheme: dark) {
      a:hover {
        background: #4b5563;
      }
    }
    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <h2>Traffic Torch Tools</h2>
  <ul id="tool-list"></ul>
  <div class="footer">Click any tool to open with current page URL</div>
  <script src="popup.js"></script>
</body>
</html>
