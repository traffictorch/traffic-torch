<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f97316" />
  <title>Quit Risk – Traffic Torch</title>
  <meta name="description" content="One URL → Instant 360° quit-risk health score + deep-dive modules + AI fixes + predictive rank forecast. Stop users from rage-quitting.">

  <!-- Global Styles -->
  <link rel="stylesheet" href="/style.css" />
  <link rel="manifest" href="/ux/manifest.json" />
  <link rel="icon" href="/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

  <!-- PWA Icon -->
  <link rel="apple-touch-icon" href="/ux/logo192.png">
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-black text-white min-h-screen">

  <!-- Header + Menu (Fixed Logo Path) -->
  <header class="bg-black/40 backdrop-blur-xl border-b border-white/10 sticky top-0 z-50">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
      <a href="/" class="flex items-center gap-3">
        <img src="/ux/logo.webp" alt="Traffic Torch" class="w-12 rounded-xl shadow-2xl"> <!-- Local fallback -->
        <span class="text-2xl font-black bg-gradient-to-r from-orange-400 to-pink-600 bg-clip-text text-transparent">Traffic Torch</span>
      </a>
      <nav class="hidden md:flex gap-8 text-lg font-semibold">
        <a href="/" class="hover:text-orange-400 transition">Dashboard</a>
        <a href="/ux/" class="text-orange-400">Quit Risk</a>
        <a href="/tools/" class="hover:text-orange-400 transition">All Tools</a>
      </nav>
      <button class="md:hidden text-3xl" onclick="document.getElementById('mobileMenu').classList.toggle('hidden')">☰</button>
    </div>
  </header>

  <div id="mobileMenu" class="hidden bg-black/90 backdrop-blur-xl border-b border-white/10 md:hidden">
    <nav class="container mx-auto px-6 py-6 flex flex-col gap-6 text-xl font-bold">
      <a href="/" class="hover:text-orange-400">Dashboard</a>
      <a href="/ux/" class="text-orange-400">Quit Risk</a>
      <a href="/tools/" class="hover:text-orange-400">All Tools</a>
    </nav>
  </div>

  <!-- Hero -->
  <main class="container mx-auto px-6 py-12 max-w-7xl text-center">
    <h1 class="text-6xl md:text-7xl font-black bg-gradient-to-r from-orange-400 to-pink-600 bg-clip-text text-transparent mb-6">
      Quit Risk
    </h1>
    <p class="text-2xl text-gray-300 max-w-3xl mx-auto mb-16">
      One URL → Instant 360° quit-risk health score + deep-dive modules + AI fixes + predictive rank forecast
    </p>

    <!-- Quit Risk App Root -->
    <div id="quit-risk-root"></div>
  </main>

  <!-- Footer -->
  <footer class="bg-black/60 backdrop-blur-xl border-t border-white/10 mt-24">
    <div class="container mx-auto px-6 py-12 text-center">
      <p class="text-gray-400">© 2025 Traffic Torch • Built for speed & zero rage-quits</p>
      <div class="flex justify-center gap-6 mt-6">
        <a href="/" class="hover:text-orange-400 transition">Home</a>
        <a href="/privacy" class="hover:text-orange-400 transition">Privacy</a>
        <a href="/terms" class="hover:text-orange-400 transition">Terms</a>
      </div>
      <button onclick="document.documentElement.classList.toggle('dark')" class="mt-6 px-6 py-2 bg-white/10 rounded-full hover:bg-white/20 transition">
        Toggle Dark Mode
      </button>
    </div>
  </footer>

  <!-- Load Quit Risk App (Local /ux/ Path) -->
  <script type="module" src="/ux/main.js"></script>

  <!-- Dark Mode Persistence -->
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
</body>
</html>
